<!doctype html>
<title>chatbots</title>
<style>
:root {
  --text-color: #404040;
}
html, body {
  height: 100%;
}
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text-color);
  font-size: 1.2rem;
  margin: 0;
}
.content {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.messages {
  max-width: 60rem;
  width: 100%;
  margin: 3rem auto;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  overflow-y: scroll;
}
.messages > div:first-of-type {
  border-top: 1px solid #aaa;
}
.user-message-container {
  border-bottom: 1px solid #aaa;
  position: relative;
}
.bot-message-container {
  border-bottom: 1px solid #aaa;
  position: relative;
  background: #f7f7f7;
}
.name {
  color: #777;
  position: absolute;
  right: 55rem;
  top: 1rem;
}
.text {
  max-width: 45rem;
  margin: 1rem auto;
  white-space: pre-wrap;
  min-height: 1.5em;
}
img { max-width: 100%; }
.attachment { display: block; margin: 4px 0; color: #666; text-decoration: none; }
.attachment:hover { text-decoration: underline; }
details { color: #666; margin: 4px 0; }
summary { cursor: pointer; color: #888; font-size: 0.9rem; }
details pre { white-space: pre-wrap; font-size: 0.85rem; margin: 4px 0; }

.bottom {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  margin-bottom: 2rem;
}
.model-select {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  margin-right: 1rem;
}
.model-select span {
  text-align: right;
}
.small-text {
  color: #999;
  font-size: .9rem;
}
.model-config {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  margin-left: 1rem;
}
.center-inputs {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.attach-file-container {
  color: #999;
  padding-bottom: .4em;
}
.link {
  text-decoration: underline;
  cursor: pointer;
}
.input-container {
  position: relative;
  display: flex;
  align-items: center;
}
.input-wrapper {
  border-radius: 5px;
  padding: 0.8rem;
  border: 1px solid #aaa;
  box-shadow: 0px 0px 10px #aaa;
}
.input:focus {
  outline: none;
}
.send-button-container {
  position: absolute;
  top: 0;
  bottom: 0;
  right: 0.3rem;
  display: flex;
  align-items: center;
}
.send-button {
  background: inherit;
  border: none;
  font-size: 1.6rem;
  border-radius: 5px;
  line-height: 1;
  cursor: pointer;
}
.send-button:hover {
  background: #ddd;
}
.send-button:active {
  margin-top: 2px;
}
.send-button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
input[type=radio], input[type=checkbox] {
  accent-color: dimgrey;
}

/* auto-growing textarea: https://css-tricks.com/the-cleanest-trick-for-autogrowing-textareas/ */
.grow-wrap {
  display: grid;
}
.grow-wrap::after {
  content: attr(data-replicated-value) " ";
  white-space: pre-wrap;
  visibility: hidden;
}
.grow-wrap > textarea {
  resize: none;
  overflow: hidden;
}
.grow-wrap > textarea,
.grow-wrap::after {
  padding: 0.5rem;
  border-radius: 5px;
  border: none;
  width: 34rem;
  font: inherit;
  font-size: 1.2rem;
  grid-area: 1 / 1 / 2 / 2;
}
</style>

<div class="content">
  <div class="messages" id="messages"></div>
  <div class="bottom">
    <div class="model-select small-text" id="model-selection">
      <span>
        <label for="claude-sonnet-4-5">Claude Sonnet 4.5</label>
        <input type="radio" id="claude-sonnet-4-5" name="model" value="claude-sonnet-4-5" checked>
      </span>
      <span>
        <label for="claude-opus-4-6">Claude Opus 4.6</label>
        <input type="radio" id="claude-opus-4-6" name="model" value="claude-opus-4-6">
      </span>
      <span>
        <label for="gpt-5">GPT-5</label>
        <input type="radio" id="gpt-5" name="model" value="gpt-5">
      </span>
    </div>
    <div class="center-inputs">
      <div class="attach-file-container">
        <span id="attach-container"><span class="link" id="attach">attach file</span></span>
        <span id="unattach" class="link" style="display:none">unattach</span>
      </div>
      <div class="input-container">
        <div class="input-wrapper">
          <div class="grow-wrap">
            <textarea id="message" class="input" rows="1" autofocus></textarea>
          </div>
        </div>
        <div class="send-button-container">
          <button id="send" class="send-button">&#x2709;</button>
        </div>
      </div>
    </div>
    <div class="model-config small-text" id="model-config"></div>
  </div>
</div>

<input type="file" id="files" multiple style="display:none">

<!-- the `.ts` import is intentional; we rewrite while serving rather than as a separate compilation step -->
<script src="./index.ts"></script>
