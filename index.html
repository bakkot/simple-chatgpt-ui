<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chatbots</title>
<style>
:root {
  --text-color: #404040;
}
html, body {
  height: 100%;
}
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text-color);
  font-size: 1.2rem;
  margin: 0;
}
.content {
  height: 100%;
  display: flex;
  flex-direction: column;
}
.messages {
  max-width: 60rem;
  width: 100%;
  margin: 3rem auto;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  overflow-y: scroll;
}
.messages > div:first-of-type {
  border-top: 1px solid #aaa;
}
.user-message-container {
  border-bottom: 1px solid #aaa;
  position: relative;
}
.bot-message-container {
  border-bottom: 1px solid #aaa;
  position: relative;
  background: #f7f7f7;
}
.name {
  color: #777;
  position: absolute;
  right: 55rem;
  top: 1rem;
}
.text {
  max-width: 45rem;
  margin: 1rem auto;
  white-space: pre-wrap;
  min-height: 1.5em;
}
img { max-width: 100%; }
.attachment { display: block; margin: 4px 0; color: #666; text-decoration: none; }
.attachment:hover { text-decoration: underline; }
details { color: #666; margin: 4px 0; }
summary { cursor: pointer; color: #888; font-size: 0.9rem; }
details pre { white-space: pre-wrap; font-size: 0.85rem; margin: 4px 0; }
a { color: #999; }
svg { vertical-align: text-bottom; }

.link-list {
  display: flex;
  flex-direction: column;
  gap: .3rem;
  margin-block-start: .3rem;
}
.bottom {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  margin-bottom: 2rem;
}
.model-select {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  margin-right: 1rem;
}
.model-select span {
  text-align: right;
}
.small-text {
  color: #999;
  font-size: .9rem;
}
.model-config {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  margin-left: 1rem;
}
.center-inputs {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.attach-file-container {
  color: #999;
  padding-bottom: .4em;
}
.link {
  text-decoration: underline;
  cursor: pointer;
}
.input-container {
  position: relative;
  display: flex;
  align-items: center;
}
.input-wrapper {
  border-radius: 5px;
  padding: 0.8rem;
  border: 1px solid #aaa;
  box-shadow: 0px 0px 10px #aaa;
}
.input:focus {
  outline: none;
}
.send-button-container {
  position: absolute;
  top: 0;
  bottom: 0;
  right: 0.3rem;
  display: flex;
  align-items: center;
}
.send-button {
  background: inherit;
  border: none;
  font-size: 1.6rem;
  border-radius: 5px;
  line-height: 1;
  cursor: pointer;
}
.send-button:hover {
  background: #ddd;
}
.send-button:active {
  margin-top: 2px;
}
.send-button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
input[type=radio], input[type=checkbox] {
  accent-color: dimgrey;
}

/* auto-growing textarea: https://css-tricks.com/the-cleanest-trick-for-autogrowing-textareas/ */
.grow-wrap {
  display: grid;
}
.grow-wrap::after {
  content: attr(data-replicated-value) " ";
  white-space: pre-wrap;
  visibility: hidden;
}
.grow-wrap > textarea {
  resize: none;
  overflow: hidden;
}
.grow-wrap > textarea,
.grow-wrap::after {
  padding: 0.5rem;
  border-radius: 5px;
  border: none;
  width: 34rem;
  font: inherit;
  font-size: 1.2rem;
  grid-area: 1 / 1 / 2 / 2;
}
.citation {
  font-size: 0.75em;
  vertical-align: super;
  margin: 0 1px;
  color: #666;
  text-decoration: none;
  cursor: pointer;
}
.citation:hover {
  text-decoration: underline;
}
.history-button {
  background: none;
  border: 1px solid #ccc;
  border-radius: 5px;
  padding: 0.4rem 1rem;
  font: inherit;
  font-size: 0.9rem;
  color: #888;
  cursor: pointer;
  margin: auto;
}
.history-button:hover {
  background: #f0f0f0;
}
.history-dialog {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 0;
  max-width: 36rem;
  width: 90vw;
  max-height: 70vh;
  font: inherit;
  color: var(--text-color);
}
.history-dialog::backdrop {
  background: rgba(0, 0, 0, 0.3);
}
.history-dialog-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.2rem 0.5rem;
}
.history-dialog-header h3 {
  margin: 0;
  font-size: 1.1rem;
  padding-right: 0.2rem;
}
.history-search {
  /* flex: 1; */
  margin: 0 0.5rem;
  padding: 0.2rem 0.4rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  font: inherit;
  font-size: 0.9rem;
  outline: none;
  min-width: 0;
}
.history-dialog-close {
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: #888;
  padding: 0 0.2rem;
  line-height: 1;
}
.history-dialog-close:hover {
  color: #444;
}
.history-list {
  list-style: none;
  margin: 0;
  padding: 0.5rem 0;
  overflow-y: auto;
  max-height: calc(70vh - 4rem);
}
.history-item {
  padding: 0.6rem 1.2rem;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1rem;
  border-top: 1px solid #eee;
}
.history-item:hover {
  background: #f0f0f0;
}
.history-item-preview {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.95rem;
}
input.history-item-preview {
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 0 4px;
  outline: none;
  font-family: inherit;
  min-width: 0;
}
.history-item-meta {
  font-size: 0.8rem;
  color: #999;
  white-space: nowrap;
}
.history-item-actions {
  display: flex;
  gap: 0.3rem;
  align-items: baseline;
}
.history-item-action {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 0.2rem;
  font-size: 0.85rem;
  color: #999;
  line-height: 1;
}
.history-item-action:hover {
  color: #444;
}
.user {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 1.5rem;
  font: inherit;
  color: var(--text-color);
}
.user::backdrop {
  background: rgba(0, 0, 0, 0.3);
}
.user-input {
  margin-top: 0.5rem;
}
.confirm-dialog {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 1.5rem;
  font: inherit;
  color: var(--text-color);
}
.confirm-dialog::backdrop {
  background: rgba(0, 0, 0, 0.3);
}
.confirm-dialog-buttons {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
  margin-top: 1rem;
}
.confirm-dialog-buttons button {
  padding: 0.3rem 1rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: none;
  font: inherit;
  font-size: 0.9rem;
  cursor: pointer;
}
.confirm-dialog-buttons button:hover {
  background: #f0f0f0;
}
.code-block-container {
  position: relative;
  margin: 0.5em 0;
  background-color: #f0f0f0;
  border-radius: 4px;
  padding: 0;
}
.code-block-container pre {
  margin: 0;
  padding: 1em;
  overflow-x: auto;
  background-color: transparent;
  border-radius: 4px;
}
.code-block-container code {
  font-family: monospace;
  font-size: 0.9em;
  display: block;
  white-space: pre;
  background: none;
  padding: 0;
}
.copy-button {
  position: absolute;
  top: 5px;
  right: 5px;
  padding: 3px 6px;
  font-size: 0.8em;
  cursor: pointer;
  background-color: #ddd;
  border: 1px solid #ccc;
  border-radius: 3px;
  opacity: 0.3;
  transition: opacity 0.2s;
  z-index: 1;
}
.code-block-container:hover .copy-button {
  opacity: 1;
}
.copy-button:active {
  background-color: #bbb;
}
</style>

<div class="content">
  <div class="messages" id="messages">
    <button class="history-button" id="history-button">history</button>
  </div>
  <dialog class="history-dialog" id="history-dialog">
    <div class="history-dialog-header">
      <h3>History</h3>
      <input type="text" class="history-search" id="history-search" placeholder="Search...">
      <button class="history-dialog-close" id="history-dialog-close">&times;</button>
    </div>
    <ul class="history-list" id="history-list"></ul>
  </dialog>
  <dialog class="user">
    Enter the username you were given:<br>
    <input autofocus class="user-input" size=56 style="font-size:1.2rem"><br><br>
    <span id="user-status"></span>
    <span id="user-confirm-box">
      <label for="save-user">remember me</label>
      <input type="checkbox" id="save-user" checked>
      &nbsp;
      <input type="button" value="confirm" id="user-confirm">
    </span>
  </dialog>
  <dialog class="confirm-dialog" id="confirm-dialog">
    <div id="confirm-dialog-message"></div>
    <div class="confirm-dialog-buttons">
      <button id="confirm-dialog-cancel">Cancel</button>
      <button id="confirm-dialog-ok">Delete</button>
    </div>
  </dialog>
  <div class="bottom">
    <div class="model-select small-text" id="model-selection">
      <span>
        <label for="claude-sonnet-4-6">Claude Sonnet 4.6</label>
        <input type="radio" id="claude-sonnet-4-6" name="model" value="claude-sonnet-4-6" checked>
      </span>
      <span>
        <label for="claude-opus-4-6">Claude Opus 4.6</label>
        <input type="radio" id="claude-opus-4-6" name="model" value="claude-opus-4-6">
      </span>
      <span>
        <label for="gpt-5.4">GPT-5.4</label>
        <input type="radio" id="gpt-5.4" name="model" value="gpt-5.4">
      </span>
      <span>
        <label for="gemini-3-flash">Gemini 3 Flash</label>
        <input type="radio" id="gemini-3-flash" name="model" value="gemini-3-flash-preview">
      </span>
      <span>
        <label for="gemini-3.1-pro">Gemini 3.1 Pro</label>
        <input type="radio" id="gemini-3.1-pro" name="model" value="gemini-3.1-pro-preview">
      </span>
    </div>
    <div class="center-inputs">
      <div class="attach-file-container">
        <span id="attach-container"><span class="link" id="attach">attach file</span></span>
        <span id="unattach" class="link" style="display:none">unattach</span>
      </div>
      <div class="input-container">
        <div class="input-wrapper">
          <div class="grow-wrap">
            <textarea id="message" class="input" rows="1" autofocus></textarea>
          </div>
        </div>
        <div class="send-button-container">
          <button id="send" class="send-button">&#x2709;</button>
        </div>
      </div>
    </div>
    <div class="model-config small-text" id="model-config"></div>
  </div>
</div>

<input type="file" id="files" multiple style="display:none">

<!-- the `.ts` import is intentional; we rewrite while serving rather than as a separate compilation step -->
<script src="./index.ts"></script>
